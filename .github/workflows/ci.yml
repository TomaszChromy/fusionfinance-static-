name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-type-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://user:pass@localhost:5432/db' }}
          AUTH_SECRET: dummy-auth
          NEXTAUTH_SECRET: dummy-auth
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build

      - name: E2E smoke (Playwright, chromium)
        env:
          BASE_URL: https://fusionfinance-static.vercel.app
        run: |
          npx playwright install chromium
          npm run test:e2e -- --project=chromium
